<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px">
<h2>Icon Generator — open this in a browser, right-click each image to save</h2>
<p>Save them to the <code>icons/</code> folder with the filenames shown.</p>
<div id="icons" style="display:flex;flex-wrap:wrap;gap:20px;margin-top:20px"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const container = document.getElementById('icons');

sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#0c0e14';
    ctx.fillRect(0, 0, size, size);

    // Rounded rect mask
    const r = size * 0.15;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#12151e';
    ctx.fill();

    // Border glow
    ctx.strokeStyle = '#7aa2f7';
    ctx.lineWidth = size * 0.02;
    ctx.stroke();

    // ASCII art text ">_"
    const mainSize = size * 0.35;
    ctx.font = `bold ${mainSize}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Glow
    ctx.shadowColor = '#7aa2f7';
    ctx.shadowBlur = size * 0.08;
    ctx.fillStyle = '#7aa2f7';
    ctx.fillText('>_', size/2, size*0.42);

    // Sub text
    ctx.shadowBlur = 0;
    const subSize = size * 0.1;
    ctx.font = `600 ${subSize}px "Courier New", monospace`;
    ctx.fillStyle = '#565f89';
    ctx.fillText('ASCII', size/2, size*0.68);
    ctx.fillText('CAM', size/2, size*0.8);

    const div = document.createElement('div');
    div.style.textAlign = 'center';
    const label = document.createElement('p');
    label.textContent = `icon-${size}.png`;
    label.style.color = '#7aa2f7';
    label.style.marginBottom = '6px';

    const img = new Image();
    img.src = canvas.toDataURL('image/png');
    img.style.width = Math.min(size, 200) + 'px';
    img.style.border = '1px solid #333';
    img.style.borderRadius = '8px';

    // Auto-download link
    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `icon-${size}.png`;
    link.textContent = 'Download';
    link.style.color = '#9ece6a';
    link.style.display = 'block';
    link.style.marginTop = '4px';

    div.appendChild(label);
    div.appendChild(img);
    div.appendChild(link);
    container.appendChild(div);
});
</script>
</body>
</html>
